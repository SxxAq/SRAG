services:
  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      network: host
    container_name: srag-backend
    network_mode: host
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./data/chat_history.db
      - SRAG_EMBEDDING_MODEL=all-MiniLM-L6-v2
      - SRAG_LLM_BACKEND=gemini
      - SRAG_LLM_MODEL=gemini-2.5-flash
      - SRAG_VECTOR_DB_PATH=/app/data/vector_store
      - SRAG_CHUNK_SIZE=1000
      - SRAG_CHUNK_OVERLAP=200
      - SRAG_TOP_K=5
      - PYTHON_UNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./srag:/app/srag
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    depends_on:
      - db

  # React Frontend (served via Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      network: host
    container_name: srag-frontend
    network_mode: host
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - backend

  # SQLite Database (for chat history)
  # Using volumes to persist data
  db:
    image: busybox:latest
    container_name: srag-db
    volumes:
      - db-data:/data
    command: sh -c "tail -f /dev/null"  # Keep container running

volumes:
  db-data:
    driver: local
